<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Backrooms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="start-screen">
            <h1>The Backrooms</h1>
            <p class="controls">Irányitás: WASD + Eger | Shift: Futás</p>
        </div>

        <div id="ui" class="hidden">
            <div id="stamina-bar"><div id="stamina-fill"></div></div>
            <p id="status-text">Keresd meg a kijáratot.</p>
        </div>

        <div id="game-over-screen" class="hidden">
            <h1 id="end-title">Meghaltál.</h1>
            <p id="end-desc">Itt maradsz örökre</p>
            <button onclick="location.reload()">Újrapróbálás</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
